name: PR Screenshots — Cleanup

# When a PR closes (merged or not), delete the orphan branch
# ``pr-screenshots/<N>`` so the repo doesn't accumulate dozens of stale
# refs. Idempotent: silently no-ops if the branch was never created.

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  prune:
    name: Delete pr-screenshots branch
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Delete pr-screenshots/<N>
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="pr-screenshots/${PR_NUMBER}"
          # Use the git refs API — does nothing (404) if the branch was never created.
          if gh api "repos/${REPO}/git/refs/heads/${BRANCH}" >/dev/null 2>&1; then
            gh api -X DELETE "repos/${REPO}/git/refs/heads/${BRANCH}"
            echo "Deleted ${BRANCH}"
          else
            echo "${BRANCH} does not exist — nothing to do."
          fi

name: Acceptance Gate (Tier A)

on:
  pull_request:
  push:
    branches: [main]

# Tier A — cheap, deterministic checks that run on every PR.
# Tier B (full xlight-evaluate gate with real analyzer pipeline + content UI
# flow) is local-only by design — see CLAUDE.md "Pre-merge acceptance gate".
# Install complexity (.venv-vamp + madmom + vamp plugins + demucs models) and
# runtime cost (~20+ min per PR cold) make it impractical on fresh CI runners.

jobs:
  python-unit-tests:
    name: Python unit + integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install ffmpeg
        # Required by stem cache, audio import, and any test that loads MP3
        # bytes via librosa/audioread. Tests that fail with
        # "FileNotFoundError: ffmpeg not found" are the symptom.
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit + integration tests
        # Excludes ui/content/slow markers — those need browser + audio fixtures
        # (handled in the ui-smoke job) or full madmom (local-only).
        #
        # The remaining --ignore flags quarantine 7 files with real algorithm /
        # snapshot drift that needs domain-knowledge investigation per file.
        # See docs/known-broken-tests.md for the breakdown and remediation plan.
        # 17 files have been un-quarantined in this batch — un-quarantining
        # PRs should update both this list and that doc.
        run: |
          pytest tests/ -m "not ui and not content and not slow and not capture_only" \
            --tb=short -v \
            --ignore=tests/integration/test_themes_integration.py \
            --ignore=tests/unit/test_genius_segments.py \
            --ignore=tests/unit/test_librosa_hpss.py \
            --ignore=tests/unit/test_repetition_policy.py \
            --ignore=tests/unit/test_section_profiler.py \
            --ignore=tests/unit/test_stem_inspector.py \
            --ignore=tests/validation/test_scenarios.py

  generator-quality-check:
    name: Generator baseline check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install package
        run: |
          pip install --upgrade pip
          pip install -e .
      - name: Check pro-reference corpus availability
        id: corpus
        # The pro-reference baseline references absolute MP3 paths on the
        # maintainer's local machine. On GitHub-hosted runners those files
        # don't exist — skip cleanly. The CC0 corpus check happens in the
        # acceptance-gate job below; this stays for the legacy generator
        # baseline workflow.
        run: |
          manifest="tests/golden/pro_reference/manifest.json"
          if [ ! -f "$manifest" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Pro-reference manifest missing — skipping legacy generator check."
            exit 0
          fi
          any_exists=false
          while IFS= read -r mp3; do
            if [ -f "$mp3" ]; then
              any_exists=true
              break
            fi
          done < <(python -c "import json, sys; [print(e['mp3_path']) for e in json.load(open('$manifest'))['entries']]")
          if [ "$any_exists" = "true" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "No pro-reference corpus on this runner — skipping (expected on GitHub-hosted CI)."
          fi
      - name: Run generator quality calibration check
        if: steps.corpus.outputs.available == 'true'
        run: xlight-evaluate check
        # Exit 0 = pass, 6 = regression, 4 = no baseline.

  ui-smoke:
    name: UI smoke flows (Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/review/frontend/package-lock.json
      - name: Install Python package + UI test extras
        run: |
          pip install --upgrade pip
          pip install -e ".[dev,ui-tests]"
      - name: Resolve Playwright version
        # Key the browser cache on the *resolved* Playwright version, not on
        # pyproject.toml. The pin is `playwright>=1.48` (a floor), so pip can
        # resolve a newer Playwright that wants a newer browser revision while
        # the pyproject.toml hash stays the same — restoring stale browsers
        # from cache and skipping the install. See `pip show playwright`.
        id: pw
        run: |
          version=$(python -c 'from importlib.metadata import version; print(version("playwright"))')
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        # Playwright Chromium is ~90 MB — cache by Playwright version so the
        # download only happens on dep bumps.
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps
      - name: Install Playwright system deps (always — fast)
        # `--with-deps` installs apt packages; safe to re-run.
        run: playwright install-deps chromium
      - name: Cache CC0 corpus MP3s
        # The download script is hash-verified, so a cached set is safe to
        # reuse. Cache key keyed on the script's SHA — bump the script,
        # force a re-download on next run.
        uses: actions/cache@v4
        with:
          path: tests/fixtures/cc0_music/*.mp3
          key: cc0-corpus-${{ hashFiles('tests/validation/download_fixtures.py', 'tests/fixtures/cc0_music/manifest.json') }}
      - name: Download CC0 corpus
        run: python -m tests.validation.download_fixtures
      - name: Build frontend bundle
        # Flask serves the built dist/ — the UI tests need it present.
        working-directory: src/review/frontend
        run: |
          npm ci
          npm run build
      - name: Run UI smoke flows
        # Runs the 4 smoke flows + multi-song + metadata-edit + folder/filter
        # + timeline-placeholder flows. Excludes:
        #   - `content`: needs the .venv-vamp sidecar (madmom/vamp)
        #   - `screenshot_all` / `readme_capture`: opt-in diagnostic flows
        #     that wait 300s for full analysis to complete — not available
        #     without the .venv-vamp sidecar.
        run: |
          pytest tests/ui/ -m "ui and not content and not screenshot_all and not readme_capture" \
            --browser chromium \
            --tb=short -v \
            --screenshot=only-on-failure \
            --video=retain-on-failure \
            --tracing=retain-on-failure \
            --full-page-screenshot
      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-${{ github.run_id }}
          path: |
            test-results/
            tests/golden/ui/screenshots/
          retention-days: 14

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-onset · Visual Directions</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  /* scoped per-direction styles live inside each artboard via a data-dir wrapper */
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions/shared.jsx"></script>
<script type="text/babel" src="directions/protool.jsx"></script>
<script type="text/babel" src="directions/clean.jsx"></script>
<script type="text/babel" src="directions/warm.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;
  const { ProToolDark, ProToolLight } = window;
  const { CleanLight, CleanDark } = window;
  const { WarmDark, WarmLight } = window;

  const AB_W = 1440, AB_H = 900;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="intro" title="Theme picker · Three directions" subtitle="Same screen, same density, three aesthetics — for 'Highway to Hell' (3:28)">
          <DCArtboard id="pro-dark" label="01 · Pro-tool — dark" width={AB_W} height={AB_H}><ProToolDark /></DCArtboard>
          <DCArtboard id="pro-light" label="01 · Pro-tool — light" width={AB_W} height={AB_H}><ProToolLight /></DCArtboard>
          <DCArtboard id="clean-light" label="02 · Clean & modern — light" width={AB_W} height={AB_H}><CleanLight /></DCArtboard>
          <DCArtboard id="clean-dark" label="02 · Clean & modern — dark" width={AB_W} height={AB_H}><CleanDark /></DCArtboard>
          <DCArtboard id="warm-dark" label="03 · Warm musical — dark" width={AB_W} height={AB_H}><WarmDark /></DCArtboard>
          <DCArtboard id="warm-light" label="03 · Warm musical — light" width={AB_W} height={AB_H}><WarmLight /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

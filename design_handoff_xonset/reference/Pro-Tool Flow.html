<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>x-onset · Pro-Tool Flow</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>html,body{margin:0;padding:0;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="directions/shared.jsx"></script>
<script type="text/babel" src="directions/protool.jsx"></script>
<script type="text/babel" src="flow/shell.jsx"></script>
<script type="text/babel" src="flow/analyze.jsx"></script>
<script type="text/babel" src="flow/review.jsx"></script>
<script type="text/babel" src="flow/export.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;
  const { LibraryShell, DropZone, Analyzing, ReviewTimeline, ExportScreen, ProToolDark } = window;
  const W = 1440, H = 900;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="flow" title="Pro-tool · end-to-end flow" subtitle="Five screens in one visual language — dark first, Inter + JetBrains Mono, dense pro density.">
          <DCArtboard id="s1-library" label="01 · Library / workspace" width={W} height={H}><LibraryShell/></DCArtboard>
          <DCArtboard id="s2-drop" label="02 · Drop MP3 (empty state)" width={W} height={H}><DropZone/></DCArtboard>
          <DCArtboard id="s3-analyze" label="03 · Analyzing" width={W} height={H}><Analyzing/></DCArtboard>
          <DCArtboard id="s4-theme" label="04 · Theme picker (our north star)" width={W} height={H}><ProToolDark/></DCArtboard>
          <DCArtboard id="s5-review" label="05 · Review + raw tracks drawer" width={W} height={H}><ReviewTimeline/></DCArtboard>
          <DCArtboard id="s6-export" label="06 · Export to xLights" width={W} height={H}><ExportScreen/></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
